# A workload that CrashLoopBackOffs on purpose, so the incident-triage skill has
# something real to triage on stage. The container starts, logs, then exits 1.
# Labels match what gather-diagnostics.sh greps for: app.kubernetes.io/name=<workload>.
apiVersion: v1
kind: Namespace
metadata:
  name: demo
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payments
  namespace: demo
  labels:
    app.kubernetes.io/name: payments
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: payments
  template:
    metadata:
      labels:
        app.kubernetes.io/name: payments
    spec:
      containers:
        - name: payments
          image: busybox:1.36
          # Simulate a bad config / failed startup: log a few lines, then crash.
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "[payments] starting up..."
              echo "[payments] loading config from /etc/payments/config.yaml"
              echo "[payments] FATAL: config key 'database.url' is missing"
              sleep 2
              exit 1
          resources:
            requests: { cpu: "10m", memory: "16Mi" }
            limits:   { cpu: "50m", memory: "32Mi" }
